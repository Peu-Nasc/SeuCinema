<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscar — CineVault</title>
  <meta name="description" content="Busque e filtre filmes, séries e animes no CineVault." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../assets/css/variables.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/search.css" />
</head>
<body class="page-search">

  <header class="navbar">
    <a href="../index.html" class="navbar__logo">
      <i data-lucide="clapperboard" class="icon" style="color: var(--accent-yellow);"></i>
      Cine<span>Vault</span>
    </a>

    <form class="search-bar" role="search" onsubmit="return false;">
      <i data-lucide="search" class="icon"></i>
      <input type="text" id="search-input" placeholder="Pesquisar filmes, séries, animes..." aria-label="Pesquisar" />
    </form>

    <nav class="navbar__links" aria-label="Navegação principal">
      <a href="../index.html" class="navbar__link"><i data-lucide="home" class="icon"></i> Início</a>
      <a href="search.html" class="navbar__link is-active"><i data-lucide="clapperboard" class="icon"></i> Filmes</a>
      <a href="search.html" class="navbar__link"><i data-lucide="tv" class="icon"></i> Séries</a>
      <a href="search.html" class="navbar__link"><i data-lucide="sparkles" class="icon"></i> Animes</a>
      <a href="lists.html" class="navbar__link"><i data-lucide="list" class="icon"></i> Listas</a>
    </nav>

    <div class="navbar__spacer"></div>

    <a href="profile.html" class="navbar__profile" aria-label="Meu perfil">
      <img class="navbar__avatar" src="https://api.dicebear.com/7.x/shapes/svg?seed=cinevault" alt="" />
    </a>
  </header>

  <main class="container">
    <div class="search-layout">

      <aside class="filters" aria-label="Filtros de busca">
        <div class="filters__group">
          <span class="filters__label">Tipo</span>
          <div class="filters__chips">
            <button class="chip is-active" data-filter-type="todos">Todos</button>
            <button class="chip" data-filter-type="filme">Filmes</button>
            <button class="chip" data-filter-type="série">Séries</button>
            <button class="chip" data-filter-type="anime">Animes</button>
            <button class="chip" data-filter-type="minissérie">Minisséries</button>
          </div>
        </div>

        <div class="filters__group">
          <span class="filters__label">Gênero</span>
          <div class="filters__chips">
            <button class="chip is-active" data-filter-genre="todos">Todos</button>
            <button class="chip" data-filter-genre="Ficção científica">Ficção científica</button>
            <button class="chip" data-filter-genre="Drama">Drama</button>
            <button class="chip" data-filter-genre="Crime">Crime</button>
            <button class="chip" data-filter-genre="Suspense">Suspense</button>
            <button class="chip" data-filter-genre="Comédia">Comédia</button>
            <button class="chip" data-filter-genre="Aventura">Aventura</button>
            <button class="chip" data-filter-genre="Fantasia">Fantasia</button>
            <button class="chip" data-filter-genre="Ação">Ação</button>
            <button class="chip" data-filter-genre="História">História</button>
          </div>
        </div>

        <div class="filters__group">
          <span class="filters__label">Nota mínima</span>
          <div class="filters__range">
            <input type="range" id="min-rating" min="0" max="10" step="0.5" value="0" />
            <span id="min-rating-label">0.0</span>
          </div>
        </div>

        <button class="filters__clear" id="filters-clear">
          <i data-lucide="rotate-ccw" class="icon" style="width:14px;height:14px;"></i> Limpar filtros
        </button>
      </aside>

      <section aria-label="Resultados">
        <div class="search-results__header">
          <span class="search-results__count" id="results-count"></span>
          <select class="sort-select" id="sort-select" aria-label="Ordenar por">
            <option value="relevance">Relevância</option>
            <option value="rating">Maior nota</option>
            <option value="year">Mais recentes</option>
            <option value="title">Título (A-Z)</option>
          </select>
        </div>

        <div class="results-grid" id="results-grid"></div>
      </section>

    </div>
  </main>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/search.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      CineVaultUI.refreshIcons();
      window.initSearch();
    });
  </script>
</body>
</html>
