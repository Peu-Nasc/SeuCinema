<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Título — CineVault</title>
  <meta name="description" content="Detalhes do título: sinopse, elenco e avaliação no CineVault." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../assets/css/variables.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/movie.css" />
</head>
<body class="page-movie">

  <header class="navbar">
    <a href="../index.html" class="navbar__logo">
      <i data-lucide="clapperboard" class="icon" style="color: var(--accent-yellow);"></i>
      Cine<span>Vault</span>
    </a>

    <form class="search-bar" role="search" onsubmit="return false;">
      <i data-lucide="search" class="icon"></i>
      <input type="text" placeholder="Pesquisar filmes, séries, animes..." aria-label="Pesquisar" />
    </form>

    <nav class="navbar__links" aria-label="Navegação principal">
      <a href="../index.html" class="navbar__link"><i data-lucide="home" class="icon"></i> Início</a>
      <a href="search.html" class="navbar__link"><i data-lucide="clapperboard" class="icon"></i> Filmes</a>
      <a href="search.html" class="navbar__link"><i data-lucide="tv" class="icon"></i> Séries</a>
      <a href="search.html" class="navbar__link"><i data-lucide="sparkles" class="icon"></i> Animes</a>
      <a href="lists.html" class="navbar__link"><i data-lucide="list" class="icon"></i> Listas</a>
    </nav>

    <div class="navbar__spacer"></div>

    <a href="profile.html" class="navbar__profile" aria-label="Meu perfil">
      <img class="navbar__avatar" src="https://api.dicebear.com/7.x/shapes/svg?seed=cinevault" alt="" />
    </a>
  </header>

  <main class="container">

    <section class="movie-hero">
      <img class="movie-hero__backdrop" src="" alt="" aria-hidden="true" />
      <div class="movie-hero__poster">
        <img src="" alt="" />
      </div>
      <div class="movie-hero__content">
        <div class="movie-hero__badges">
          <span class="pill pill--type" id="pill-type">—</span>
        </div>
        <h1 class="movie-hero__title">Carregando...</h1>
        <p class="movie-hero__tagline"></p>
        <div class="movie-hero__meta">
          <span class="movie-hero__rating"><i data-lucide="star" class="icon"></i> <span id="hero-rating">—</span></span>
          <span><strong id="meta-year">—</strong></span>
          <span id="meta-runtime">—</span>
          <span id="meta-genres">—</span>
        </div>
        <p class="movie-hero__desc"></p>
        <div class="movie-hero__actions">
          <button class="btn btn--primary"><i data-lucide="check" class="icon"></i> Marcar como assistido</button>
          <button class="btn btn--ghost"><i data-lucide="bookmark" class="icon"></i> Quero assistir</button>
          <button class="btn--icon" aria-label="Favoritar"><i data-lucide="heart" class="icon"></i></button>
          <div class="rate-widget" aria-label="Avaliar de 1 a 5">
            <button aria-label="Nota 1"><i data-lucide="star" class="icon"></i></button>
            <button aria-label="Nota 2"><i data-lucide="star" class="icon"></i></button>
            <button aria-label="Nota 3"><i data-lucide="star" class="icon"></i></button>
            <button aria-label="Nota 4"><i data-lucide="star" class="icon"></i></button>
            <button aria-label="Nota 5"><i data-lucide="star" class="icon"></i></button>
          </div>
        </div>
      </div>
    </section>

    <section class="section" aria-labelledby="titulo-elenco">
      <div class="section__header">
        <h2 class="section__title" id="titulo-elenco"><i data-lucide="users"></i> Elenco</h2>
      </div>
      <div class="cast-grid" id="cast-grid"></div>
    </section>

    <section class="section" aria-labelledby="titulo-avaliacao">
      <div class="section__header">
        <h2 class="section__title" id="titulo-avaliacao"><i data-lucide="message-square"></i> Sua anotação</h2>
      </div>
      <div class="review-box">
        <label for="review-text" class="visually-hidden">Escreva sua anotação sobre este título</label>
        <textarea id="review-text" placeholder="O que você achou? (só você vê isso)"></textarea>
        <button class="btn btn--primary"><i data-lucide="save" class="icon"></i> Salvar anotação</button>
      </div>
    </section>

    <section class="section" aria-labelledby="titulo-parecidos">
      <div class="section__header">
        <h2 class="section__title" id="titulo-parecidos"><i data-lucide="shuffle"></i> Títulos parecidos</h2>
      </div>
      <div class="carousel" id="similar-carousel"></div>
    </section>

  </main>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/movie.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      CineVaultUI.refreshIcons();
      window.initMovie();
    });
  </script>
</body>
</html>
